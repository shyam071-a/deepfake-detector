<!DOCTYPE html>
<html>
<head>
<title>Deepfake Detector</title>
<style>
body {font-family: Arial; background:#0f2027; color:white; text-align:center;}
.box {background:#1e2a38; padding:20px; margin:20px auto; width:400px; border-radius:10px;}
button {padding:10px; background:#4c6ef5; border:none; color:white; cursor:pointer;}
</style>
</head>

<body>

<h1>🛡 Deepfake Detection System</h1>

<div class="box">
    <input type="file" id="file"><br><br>
    <button onclick="upload()">Analyze</button>

    <h2 id="result"></h2>
    <h3 id="confidence"></h3>
</div>

<script>
function upload(){
    let file = document.getElementById("file").files[0];

    let formData = new FormData();
    formData.append("file", file);

    fetch("http://127.0.0.1:5000/detect", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.result;
        document.getElementById("confidence").innerText = "Confidence: " + data.confidence + "%";
    })
}
</script>

</body>
</html>
